<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Glenquarie Morning Kick Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="contact-header">
        <div class="header-left">
            <div class="logo-placeholder"></div>
        </div>
        <h1 class="contact-title">Contact Us</h1>
        <div class="header-right">
            <button class="menu-toggle" aria-label="Toggle Menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </header>

    <main class="contact-wrapper">
        <form id="contactForm" class="contact-form" novalidate>
            <div class="form-group">
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <div class="error-message" id="nameError">Please enter your name.</div>
            </div>

            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Your Email Address" required>
                <div class="error-message" id="emailError">Please enter a valid email address.</div>
            </div>

            <div class="form-group">
                <textarea id="message" name="message" placeholder="Your Message/Inquiry" rows="5" required></textarea>
                <div class="error-message" id="messageError">Please enter your message or inquiry.</div>
            </div>

            <div class="form-group submit-group">
                <button type="submit" class="submit-btn">Submit</button>
                <div class="success-message" id="formSuccess">Your message has been sent successfully!</div>
            </div>
        </form>
    </main>

    <footer class="contact-footer">
        <div class="footer-left">
            <p class="hours-block">Open: Mon–Sun | 6:00 AM – 4:00 PM</p>
            <p class="info-block">Glenquarie Shopping Centre, Macquarie Fields</p>
        </div>
        <div class="footer-right">
            <div class="social-dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <p class="quick-links-label">Quick links</p>
        </div>
    </footer>

</body>
</html>
